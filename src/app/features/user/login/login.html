<article class="page-login">
    <form (ngSubmit)="login()" [formGroup]="loginForm" class="form">
      <h1>Login</h1>
      <mat-form-field>
        <mat-label> <mat-icon>email</mat-icon> Email</mat-label>
        <input type="text" matInput formControlName="email" placeholder="Email" (keyup.enter)="login()" />
      </mat-form-field>
      <mat-form-field>
        <mat-label> <mat-icon>lock</mat-icon> Senha</mat-label>
        <input type="password" matInput formControlName="password" placeholder="Senha" (keyup.enter)="login()" />
      </mat-form-field>
      <button type="submit" class="btn-login">Enviar</button>
  </form>
</article>
